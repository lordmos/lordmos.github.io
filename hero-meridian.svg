<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Dark background: deep purple to near-black -->
    <radialGradient id="bg" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#080412"/>
    </radialGradient>
    <!-- Central glow orb -->
    <radialGradient id="glow-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <!-- Letter gradient: lavender -> violet -> cyan -->
    <linearGradient id="letter-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="45%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <!-- Heavy blur for glow blob -->
    <filter id="glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <!-- Soft glow on letter (blur + merge with sharp) -->
    <filter id="letter-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="97" fill="url(#bg)"/>

  <!-- Primary glow orb (blurred) -->
  <circle cx="100" cy="98" r="54" fill="url(#glow-orb)" filter="url(#glow-blur)"/>

  <!-- Secondary accent glow (offset slightly) -->
  <circle cx="114" cy="86" r="30" fill="#4f46e5" opacity="0.18" filter="url(#glow-blur)"/>

  <!-- Letter with soft glow -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="88" font-weight="800" fill="url(#letter-fill)"
        filter="url(#letter-glow)">M</text>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none"
          stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
</svg>
